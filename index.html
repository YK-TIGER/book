<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>방탈출 예약</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>방탈출 예약 시스템</h1>

<button onclick="location.href='reservation/'">
예약하기
</button>

<button onclick="loadList()">
예약자 명단
</button>

<div id="list"></div>

</div>

<script>

const API="여기에 Apps Script URL";

async function loadList(){

    const res=await fetch(API+"?t="+Date.now());

    const data=await res.json();

    let html=`
    <table>

    <tr>

    <th>시간</th>
    <th>이름</th>
    <th>학번</th>
    <th>인원</th>

    </tr>
    `;

    data.forEach(row=>{

        html+=`
        <tr>

        <td>${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}명</td>

        </tr>
        `;

    });

    html+="</table>";

    document.getElementById("list").innerHTML=html;

}

</script>

</body>

</html>
